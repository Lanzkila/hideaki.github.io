<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <title>Kirin Central | Dashboard & Converter</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { background: #0d1117; color: #c9d1d9; font-family: 'Inter', sans-serif; padding: 20px; max-width: 900px; margin: auto; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
        .box { background: #161b22; padding: 20px; border-radius: 12px; border: 1px solid #30363d; margin-bottom: 20px; }
        h1, h2 { color: #58a6ff; text-align: center; }
        .card { background: #0d1117; padding: 15px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #30363d; }
        button { padding: 10px 20px; cursor: pointer; background: #238636; color: white; border: none; border-radius: 6px; font-weight: bold; width: 100%; }
        input { background: #0d1117; border: 1px solid #30363d; color: white; padding: 5px; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>Kirin Central Dashboard 🌚</h1>
    
    <div class="grid">
        <div>
            <h2>📂 My Vault</h2>
            <div id="repo-list">Loading repositories...</div>
        </div>
        
        <div>
            <h2>🛠️ Kirin Converter</h2>
            <div class="box">
                <h3>CBZ/ZIP to PDF</h3>
                <input type="file" id="zipInput" accept=".zip,.cbz"><br><br>
                <label>W (mm):</label><input type="number" id="pdfWidth" value="210" style="width:50px;">
                <label>H (mm):</label><input type="number" id="pdfHeight" value="297" style="width:50px;"><br><br>
                <label>Quality:</label><input type="number" id="pdfQuality" value="0.7" step="0.1" max="1" style="width:50px;"><br><br>
                <button onclick="zipToPdf()">Convert to PDF</button>
            </div>
        </div>
    </div>

    <script>
        const username = 'Kirin-Bot'; // TUKAR KE USERNAME ANDA

        // Fetch Repositories
        fetch(`https://api.github.com/users/${username}/repos?sort=updated&per_page=5`)
            .then(res => res.json())
            .then(data => {
                document.getElementById('repo-list').innerHTML = data.filter(r => !r.fork).map(r => `
                    <div class="card"><a href="${r.html_url}" style="color:#58a6ff;">${r.name}</a></div>
                `).join('');
            });

        // Converter Logic
        async function zipToPdf() {
            const file = document.getElementById('zipInput').files[0];
            const width = document.getElementById('pdfWidth').value;
            const height = document.getElementById('pdfHeight').value;
            if (!file) return alert("Pilih fail dulu!");
            
            const zip = await JSZip.loadAsync(file);
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('p', 'mm', [width, height]);
            let first = true;
            const files = Object.keys(zip.files).sort();

            for (let filename of files) {
                if (filename.match(/\.(jpg|jpeg|png)$/i)) {
                    if (!first) pdf.addPage();
                    const imgData = await zip.files[filename].async("base64");
                    pdf.addImage('data:image/jpeg;base64,' + imgData, 'JPEG', 0, 0, width, height, undefined, 'FAST');
                    first = false;
                }
            }
            pdf.save("converted_by_kirin.pdf");
        }
    </script>
</body>
</html>
