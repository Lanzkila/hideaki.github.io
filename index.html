<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <title>Comic Converter: CBZ ↔ PDF ↔ ZIP</title>
    <script src="https://cdnjs.cloudflare.com"></script>
    <script src="https://cdnjs.cloudflare.com"></script>
<style>
    :root {
        --primary: #6366f1;
        --primary-hover: #4f46e5;
        --bg: #f8fafc;
    }

    body { 
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
        background-color: var(--bg);
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
    }

    .container { 
        background: white; 
        padding: 40px; 
        border-radius: 20px; 
        box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
        width: 100%;
        max-width: 450px;
        text-align: center;
    }

    h2 { color: #1e293b; margin-bottom: 10px; }
    p { color: #64748b; font-size: 0.9rem; margin-bottom: 25px; }

.file-drop-area {
    position: relative;
    display: flex;
    flex-direction: column; /* Ikon di atas teks */
    align-items: center;
    justify-content: center;
    width: 100%;
    padding: 40px 20px;
    border: 2px dashed #e2e8f0;
    border-radius: 16px;
    background: #ffffff;
    
    /* Efek Shadow Box */
    box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
    
    transition: all 0.3s ease;
    cursor: pointer;
    margin-bottom: 25px;
}

/* Efek saat mouse mendekat atau file ditarik ke atasnya */
.file-drop-area:hover, .file-drop-area.dragover {
    border-color: #6366f1;
    background: #f8faff;
    transform: translateY(-2px);
    box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
}

.file-drop-area input {
    position: absolute;
    left: 0; top: 0; height: 100%; width: 100%;
    opacity: 0; 
    cursor: pointer;
}

.file-msg {
    color: #475569;
    font-size: 15px;
    font-weight: 500;
}

    /* Buttons */
    .btn-group { display: grid; gap: 10px; }
    
    button { 
        padding: 12px; 
        cursor: pointer; 
        background: var(--primary); 
        color: white; 
        border: none; 
        border-radius: 10px; 
        font-weight: 600;
        transition: 0.2s;
    }

    button:hover { background: var(--primary-hover); transform: translateY(-1px); }
    button.secondary { background: #f1f5f9; color: #475569; }
    button.secondary:hover { background: #e2e8f0; }

    #status { 
        margin-top: 20px; 
        font-size: 13px; 
        padding: 10px;
        border-radius: 8px;
        display: none; /* Hidden by default */
    }
</style>
</head>
<body>

<div class="container">
    <h2>Comic Converter</h2>
    <p>Tukar fail CBZ/ZIP ke PDF dengan cepat.</p>
    
    <div class="file-drop-area" id="dropArea">
    <!-- Ikon Folder -->
    <i class="material-icons" style="font-size: 48px; color: #6366f1; margin-bottom: 10px;">folder_open</i>
    <span class="file-msg" id="fileName">Tarik fail ke sini atau klik untuk cari</span>
    <input type="file" id="fileInput" accept=".cbz,.zip" onchange="updateFileName()">
</div>

    <div class="btn-group">
        <button onclick="convertToPDF()">Tukar ke PDF</button>
        <button class="secondary" onclick="reverseToZip()">Tukar ke ZIP</button>
    </div>
    
    <div id="status"></div>
</div>

<script>
    const { jsPDF } = window.jspdf;

    async function convertToPDF() {
        const fileInput = document.getElementById('fileInput');
        const status = document.getElementById('status');
        if (fileInput.files.length === 0) return alert("Sila pilih fail!");

        const file = fileInput.files[0];
        status.innerText = "Sedang memproses... Sila tunggu.";
        
        try {
            const zip = await JSZip.loadAsync(file);
            const pdf = new jsPDF();
            const imgFiles = Object.keys(zip.files).filter(name => /\.(jpe?g|png|webp)$/i.test(name)).sort();

            for (let i = 0; i < imgFiles.length; i++) {
                const imgData = await zip.files[imgFiles[i]].async("blob");
                const imgUrl = URL.createObjectURL(imgData);
                
                // Tambah gambar ke PDF
                const img = new Image();
                img.src = imgUrl;
                await new Promise(resolve => img.onload = resolve);
                
                if (i > 0) pdf.addPage();
                const pageWidth = pdf.internal.pageSize.getWidth();
                const pageHeight = pdf.internal.pageSize.getHeight();
                pdf.addImage(img, 'JPEG', 0, 0, pageWidth, pageHeight);
                URL.revokeObjectURL(imgUrl);
            }

            pdf.save(file.name.replace(/\.[^/.]+$/, "") + ".pdf");
            status.innerText = "Siap! PDF telah dimuat turun.";
        } catch (e) {
            status.innerText = "Ralat: Fail mungkin rosak atau tidak disokong.";
        }
    }

    async function reverseToZip() {
        const fileInput = document.getElementById('fileInput');
        const status = document.getElementById('status');
        if (fileInput.files.length === 0) return alert("Sila pilih fail!");

        const file = fileInput.files[0];
        status.innerText = "Menukar kembali ke ZIP...";

        try {
            const zip = await JSZip.loadAsync(file);
            const content = await zip.generateAsync({type:"blob"});
            const link = document.createElement("a");
            link.href = URL.createObjectURL(content);
            link.download = file.name.replace(".cbz", ".zip");
            link.click();
            status.innerText = "Siap! Fail ditukar ke .zip.";
        } catch (e) {
            status.innerText = "Ralat semasa menukar.";
        }
    }

    function updateFileName() {
    const input = document.getElementById('fileInput');
    const msg = document.getElementById('fileName');
    if (input.files.length > 0) {
        msg.innerText = "Fail dipilih: " + input.files[0].name;
        msg.style.color = "#6366f1";
    }
}

// Tambah ini dalam fungsi convertToPDF / reverseToZip untuk tunjuk status
function showStatus(text, isError = false) {
    const status = document.getElementById('status');
    status.style.display = "block";
    status.innerText = text;
    status.style.backgroundColor = isError ? "#fee2e2" : "#f0fdf4";
    status.style.color = isError ? "#991b1b" : "#166534";
}

    const dropArea = document.getElementById('dropArea');

['dragenter', 'dragover'].forEach(eventName => {
    dropArea.addEventListener(eventName, (e) => {
        e.preventDefault();
        dropArea.classList.add('dragover');
    }, false);
});

['dragleave', 'drop'].forEach(eventName => {
    dropArea.addEventListener(eventName, (e) => {
        e.preventDefault();
        dropArea.classList.remove('dragover');
    }, false);
});

</script>

</body>
</html>
