<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comic Converter</title>
    
    <!-- Library Penting -->
    <script src="https://cdnjs.cloudflare.com"></script>
    <script src="https://cdnjs.cloudflare.com"></script>
    <link href="https://fonts.googleapis.com" rel="stylesheet">

    <style>
        :root { --primary: #5d6cf1; --bg: #f8faff; }
        body { background: var(--bg); font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 40px; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); width: 350px; text-align: center; }
        .file-drop-area { position: relative; border-radius: 20px; padding: 40px 20px; margin-bottom: 20px; box-shadow: inset 0 0 0 1px #edf2f7, 0 10px 20px rgba(0,0,0,0.03); cursor: pointer; display: flex; flex-direction: column; align-items: center; }
        .icon-display { font-size: 50px !important; color: var(--primary); margin-bottom: 10px; font-style: normal !important; }
        .file-msg { color: #4a5568; font-size: 0.8rem; font-weight: 500; }
        input[type=file] { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
        .btn-group { display: flex; flex-direction: column; gap: 10px; }
        button { padding: 12px; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; font-size: 0.9rem; transition: 0.2s; }
        .btn-pdf { background: var(--primary); color: white; }
        .btn-zip { background: #edf2f7; color: #4a5568; }
        button:active { transform: scale(0.98); }
        #status { margin-top: 15px; font-size: 0.75rem; color: #718096; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="margin:0 0 5px 0;">Comic Converter</h2>
    <p style="color:#718096; font-size:0.8rem; margin-bottom:25px;">Tukar fail CBZ/ZIP ke PDF dengan cepat.</p>
    
    <div class="file-drop-area">
        <i class="material-icons icon-display">folder_open</i>
        <span id="fileName" class="file-msg">Tarik fail ke sini atau klik untuk cari</span>
        <input type="file" id="fileInput" accept=".cbz,.zip">
    </div>

    <div class="btn-group">
        <button class="btn-pdf" onclick="convertToPDF()">Tukar ke PDF</button>
        <button class="btn-zip" onclick="reverseToZip()">Tukar ke ZIP</button>
    </div>
    <div id="status"></div>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const fileNameDisplay = document.getElementById('fileName');
    const status = document.getElementById('status');

    // Papar nama fail bila dipilih
    fileInput.onchange = () => {
        if (fileInput.files.length > 0) {
            fileNameDisplay.innerText = fileInput.files[0].name;
            status.innerText = "Fail sedia untuk ditukar.";
        }
    };

    async function convertToPDF() {
    if (fileInput.files.length === 0) return alert("Sila pilih fail dahulu!");
    
    status.style.display = "block";
    status.innerText = "Sedang membaca fail ZIP...";
    const file = fileInput.files[0];
    
    try {
        const zip = await JSZip.loadAsync(file);
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF();
        
        // Ambil fail imej dan susun mengikut nama (sort)
        // Kita tapis fail yang bermula dengan '__MACOSX' (sampah sistem Mac)
        const images = Object.keys(zip.files).filter(name => 
            /\.(jpe?g|png|webp)$/i.test(name) && !name.includes('__MACOSX')
        ).sort();
        
        if (images.length === 0) {
            throw new Error("Tiada imej (JPG/PNG/WEBP) ditemui dalam fail ZIP ini.");
        }

        for (let i = 0; i < images.length; i++) {
            status.innerText = `Memproses imej ${i + 1} daripada ${images.length}...`;
            
            const imgData = await zip.files[images[i]].async("uint8array");
            const blob = new Blob([imgData]);
            const url = URL.createObjectURL(blob);

            try {
                const img = new Image();
                img.src = url;
                await new Promise((resolve, reject) => {
                    img.onload = resolve;
                    img.onerror = () => reject(new Error(`Gagal memuatkan imej: ${images[i]}`));
                });

                if (i > 0) pdf.addPage();
                
                const pw = pdf.internal.pageSize.getWidth();
                const ph = pdf.internal.pageSize.getHeight();
                
                // Automatik kesan format untuk jsPDF
                const format = images[i].split('.').pop().toUpperCase();
                const finalFormat = format === 'JPG' ? 'JPEG' : format;

                pdf.addImage(img, finalFormat, 0, 0, pw, ph, undefined, 'FAST');
            } finally {
                URL.revokeObjectURL(url); // Bersihkan memori
            }
        }

        pdf.save(file.name.replace(/\.[^/.]+$/, "") + ".pdf");
        status.innerText = "✅ Siap! PDF telah dimuat turun.";
        status.style.color = "#166534";
    } catch (e) {
        console.error(e);
        status.innerText = "❌ Ralat: " + e.message;
        status.style.color = "#991b1b";
    }
}

    async function reverseToZip() {
        if (fileInput.files.length === 0) return alert("Sila pilih fail dahulu!");
        const file = fileInput.files[0];
        const link = document.createElement('a');
        link.href = URL.createObjectURL(file);
        link.download = file.name.replace(".cbz", ".zip");
        link.click();
        status.innerText = "Siap! Fail ditukar ke .zip";
    }
</script>

</body>
</html>
