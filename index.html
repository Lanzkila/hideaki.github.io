<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <title>Kirin Central | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            background: #0d1117; color: #c9d1d9; font-family: 'Inter', sans-serif; 
            padding: 50px 20px; max-width: 800px; margin: auto; 
        }
        h1 { text-align: center; color: #58a6ff; margin-bottom: 40px; }
        .repo-grid { display: grid; gap: 15px; }
        .repo-card { 
            background: #161b22; padding: 20px; border-radius: 12px; 
            border: 1px solid #30363d; transition: transform 0.3s, border 0.3s;
        }
        .repo-card:hover { 
            transform: translateY(-5px); border: 1px solid #58a6ff; 
        }
        a { text-decoration: none; color: #58a6ff; font-weight: bold; font-size: 1.2em; }
        p { color: #8b949e; font-size: 0.9em; margin-top: 5px; }
        .loading { text-align: center; color: #8b949e; }
    </style>
</head>
<body>
    <h1>Kirin Central Dashboard 🌚</h1>
    <div id="repo-list" class="repo-grid">
        <div class="loading">Memuatkan harta karun...</div>
    </div>

    <script>
        const username = 'Kirin-Bot'; // TUKAR NI KE USERNAME AWAK
        fetch(`https://api.github.com/users/${username}/repos?sort=updated`)
            .then(res => res.json())
            .then(data => {
                const list = document.getElementById('repo-list');
                list.innerHTML = data.filter(repo => !repo.fork).map(repo => `
                    <div class="repo-card">
                        <a href="${repo.html_url}" target="_blank">${repo.name}</a>
                        <p>${repo.description || 'Tiada deskripsi, tapi ini memang harta karun.'}</p>
                    </div>
                `).join('');
            });
    </script>
</body>
</html>
